# .sops.yaml — cleaned and fixed

keys:
  - &pluto_host   age1wc833nmhyfgz8klhegnjn8fnyfful7v9dymk2w3jrgn0r7gjwfgq9tgqrz
  - &testbed_host age1AAAA_PLACEHOLDER_run_ssh_to_age_for_testbed # TODO: fill when testbed ready
  - &yubikey      age1yubikey1q_PLACEHOLDER_run_age_plugin_yubikey # TODO: fill when YubiKey arrives

creation_rules:
  # pluto machine secrets → only pluto host key
  - path_regex: ^secrets/machines/pluto/.*\.yaml$
    age: [*pluto_host]

  # testbed machine secrets → only testbed host key
  - path_regex: ^secrets/machines/testbed/.*\.yaml$
    age: [*testbed_host]

  # management secrets → Shamir threshold 2 (needs both YubiKey + pluto)
  - path_regex: ^secrets/management/.*\.yaml$
    key_groups:
      - age: [*yubikey, *pluto_host]
    shamir_threshold: 2

  # fallback for anything else
  - path_regex: ^secrets/.*$
    age: [*yubikey]
